name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Install dependencies
        run: |
          brew install cmake eigen python3
          pip3 install glad2

      - name: Setup external dependencies
        run: |
          rm -rf external/glfw external/imgui external/googletest external/implot external/nfd external/glad external/nlohmann
          git clone --depth 1 --branch 3.4 https://github.com/glfw/glfw.git external/glfw
          git clone --depth 1 --branch docking https://github.com/ocornut/imgui.git external/imgui
          git clone --depth 1 --branch v1.14.0 https://github.com/google/googletest.git external/googletest
          git clone --depth 1 https://github.com/epezent/implot.git external/implot
          git clone --depth 1 https://github.com/btzy/nativefiledialog-extended.git external/nfd
          python3 -m glad --api gl:core=4.6 --out-path external/glad c
          mkdir -p external/nlohmann
          curl -sL https://github.com/nlohmann/json/releases/download/v3.11.3/json.hpp -o external/nlohmann/json.hpp

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j"$(sysctl -n hw.ncpu)"

      - name: Run unit tests
        run: |
          cd build
          ctest --output-on-failure -E "integration|pyscf|pes"

      - name: Upload build artifact
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-build
          path: build/schrodingers_sandbox.app
          retention-days: 30

  build-macos-x86:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Install dependencies
        run: |
          brew install cmake eigen python3
          pip3 install glad2

      - name: Setup external dependencies
        run: |
          rm -rf external/glfw external/imgui external/googletest external/implot external/nfd external/glad external/nlohmann
          git clone --depth 1 --branch 3.4 https://github.com/glfw/glfw.git external/glfw
          git clone --depth 1 --branch docking https://github.com/ocornut/imgui.git external/imgui
          git clone --depth 1 --branch v1.14.0 https://github.com/google/googletest.git external/googletest
          git clone --depth 1 https://github.com/epezent/implot.git external/implot
          git clone --depth 1 https://github.com/btzy/nativefiledialog-extended.git external/nfd
          python3 -m glad --api gl:core=4.6 --out-path external/glad c
          mkdir -p external/nlohmann
          curl -sL https://github.com/nlohmann/json/releases/download/v3.11.3/json.hpp -o external/nlohmann/json.hpp

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j"$(sysctl -n hw.ncpu)"

      - name: Run unit tests
        run: |
          cd build
          ctest --output-on-failure -E "integration|pyscf|pes"

  build-ubuntu:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential pkg-config libeigen3-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl-dev \
            libgtk-3-dev python3-pip xvfb curl
          pip3 install glad2

      - name: Setup external dependencies
        run: |
          rm -rf external/glfw external/imgui external/googletest external/implot external/nfd external/glad external/nlohmann
          git clone --depth 1 --branch 3.4 https://github.com/glfw/glfw.git external/glfw
          git clone --depth 1 --branch docking https://github.com/ocornut/imgui.git external/imgui
          git clone --depth 1 --branch v1.14.0 https://github.com/google/googletest.git external/googletest
          git clone --depth 1 https://github.com/epezent/implot.git external/implot
          git clone --depth 1 https://github.com/btzy/nativefiledialog-extended.git external/nfd
          python3 -m glad --api gl:core=4.6 --out-path external/glad c
          mkdir -p external/nlohmann
          curl -sL https://github.com/nlohmann/json/releases/download/v3.11.3/json.hpp -o external/nlohmann/json.hpp

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Run unit tests
        run: |
          cd build
          ctest --output-on-failure -E "integration|pyscf|pes"

      - name: Upload build artifact
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-build
          path: build/schrodingers_sandbox
          retention-days: 30

  integration-tests:
    runs-on: ubuntu-22.04
    needs: build-ubuntu
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential pkg-config libeigen3-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl-dev \
            libgtk-3-dev python3-pip xvfb curl
          pip3 install glad2

      - name: Install PySCF and geomeTRIC
        run: |
          pip3 install pyscf geometric

      - name: Setup external dependencies
        run: |
          rm -rf external/glfw external/imgui external/googletest external/implot external/nfd external/glad external/nlohmann
          git clone --depth 1 --branch 3.4 https://github.com/glfw/glfw.git external/glfw
          git clone --depth 1 --branch docking https://github.com/ocornut/imgui.git external/imgui
          git clone --depth 1 --branch v1.14.0 https://github.com/google/googletest.git external/googletest
          git clone --depth 1 https://github.com/epezent/implot.git external/implot
          git clone --depth 1 https://github.com/btzy/nativefiledialog-extended.git external/nfd
          python3 -m glad --api gl:core=4.6 --out-path external/glad c
          mkdir -p external/nlohmann
          curl -sL https://github.com/nlohmann/json/releases/download/v3.11.3/json.hpp -o external/nlohmann/json.hpp

      - name: Configure
        env:
          SBOX_RUN_INTEGRATION_TESTS: "1"
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Run integration tests
        env:
          SBOX_RUN_INTEGRATION_TESTS: "1"
          SBOX_SKIP_SLOW_TESTS: "1"
        run: |
          cd build
          ctest --output-on-failure -R "integration|pyscf"
        timeout-minutes: 30

  package:
    runs-on: macos-14
    needs: [build-macos-arm64, build-ubuntu]
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Install dependencies
        run: |
          brew install cmake eigen python3
          pip3 install glad2

      - name: Setup externals
        run: |
          rm -rf external/glfw external/imgui external/googletest external/implot external/nfd external/glad external/nlohmann
          git clone --depth 1 --branch 3.4 https://github.com/glfw/glfw.git external/glfw
          git clone --depth 1 --branch docking https://github.com/ocornut/imgui.git external/imgui
          git clone --depth 1 --branch v1.14.0 https://github.com/google/googletest.git external/googletest
          git clone --depth 1 https://github.com/epezent/implot.git external/implot
          git clone --depth 1 https://github.com/btzy/nativefiledialog-extended.git external/nfd
          python3 -m glad --api gl:core=4.6 --out-path external/glad c
          mkdir -p external/nlohmann
          curl -sL https://github.com/nlohmann/json/releases/download/v3.11.3/json.hpp -o external/nlohmann/json.hpp

      - name: Configure and build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j"$(sysctl -n hw.ncpu)"

      - name: Package DMG
        run: |
          cd build
          cpack -G DragNDrop

      - name: Upload DMG
        uses: softprops/action-gh-release@v2
        with:
          files: SchrodingersSandbox-*.dmg
